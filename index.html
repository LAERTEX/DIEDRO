<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR con Marcador - Modelo Diedrico</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    h1 {
      margin-top: 20px;
      color: #333;
      text-align: center;
    }

    p {
      margin-top: 10px;
      color: #555;
      text-align: center;
    }

    a-scene {
      width: 90%;
      max-width: 800px;
      height: 600px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      background-color: #ffffff;
      margin-bottom: 20px;
    }

    #overlay {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 14px;
      text-align: center;
      z-index: 10;
    }
  </style>
</head>
<body>

  <h1>Modelo Diedrico AR con Marcador</h1>
  <p>Escanea el QR para abrir esta página y coloca tu folio con el marcador frente a la cámara.</p>

  <div id="overlay">Apunta la cámara al folio para ver el modelo</div>

  <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

    <!-- Marcador clásico Hiro -->
    <a-marker preset="hiro" id="marker">
      <a-entity 
        gltf-model="diedrico2.glb"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        position="0 0 0">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Mostrar/ocultar overlay según se detecte el marcador
    const marker = document.querySelector('#marker');
    const overlay = document.querySelector('#overlay');

    marker.addEventListener('markerFound', () => {
      overlay.style.display = 'none';
    });

    marker.addEventListener('markerLost', () => {
      overlay.style.display = 'block';
    });
  </script>

</body>
</html>
