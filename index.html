<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Modelo Diedrico AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5; /* Fondo agradable */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  h1 {
    margin-top: 20px;
    color: #333;
    text-align: center;
  }

  model-viewer {
    width: 90%;
    max-width: 800px;
    height: 600px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* sombra elegante */
    background-color: #fff; /* Fondo del visor */
  }

  p {
    margin-top: 15px;
    color: #555;
    text-align: center;
  }
</style>

</head>
<body>

<h1>Visualiza el modelo Diedrico en 3D y AR</h1>

<model-viewer
  src="diedrico2.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  style="background-color: #ffffff;">
</model-viewer>

<p>Escanea el QR o abre esta página en tu móvil para ver el modelo en realidad aumentada.</p>

</body>
</html>
