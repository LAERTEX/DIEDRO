<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR con Marcador - Modelo Diedrico</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#f5f5f5; text-align:center; }
    h1 { margin:20px 0 0 0; }
    a-scene { width: 100%; height: 80vh; }
    #overlay {
      position:absolute; top:10px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:white; padding:6px 12px; border-radius:5px;
    }
  </style>
</head>
<body>

<h1>Modelo Diedrico AR</h1>
<div id="overlay">Apunta la cámara al folio para ver el modelo</div>

<a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled:false;">
  <a-marker preset="hiro" id="marker">
    <a-entity gltf-model="diedrico2.glb" scale="0.5 0.5 0.5" position="0 0 0"></a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<script>
const marker = document.querySelector('#marker');
const overlay = document.querySelector('#overlay');

marker.addEventListener('markerFound', ()=>overlay.style.display='none');
marker.addEventListener('markerLost', ()=>overlay.style.display='block');
</script>

</body>
</html>
